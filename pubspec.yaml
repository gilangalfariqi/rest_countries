name: rest_countries_app
description: Professional Flutter app using REST Countries API
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2

  # Network
  dio: ^5.3.3
  connectivity_plus: ^5.0.1

  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Functional Programming
  dartz: ^0.10.1

  # Equatable
  equatable: ^2.0.5

  # UI
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9

  # Utils
  logger: ^2.0.2
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  injectable_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true